services:
  backend:
    build:
      context: ./backend
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/runtime:/app/runtime
      - ./docs:/app/docs:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped
